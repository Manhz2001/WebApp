<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrugViewNinhBinh®</title>
  <meta name="description" content="Cổng tra cứu thuốc, phác đồ điều trị và cập nhật chuyên môn dược." />
  <style>
    :root {
      --primary: #0b66d0;
      --accent: #ef2b2d;
      --text: #14304d;
      --muted: #6b7f95;
      --white: #ffffff;
      --bg: #f4f9ff;
      --border: #dce9f6;
      --shadow-sm: 0 8px 24px rgba(11, 102, 208, 0.08);
      --shadow-md: 0 16px 40px rgba(11, 102, 208, 0.12);
      --shadow-lg: 0 24px 56px rgba(11, 102, 208, 0.18);
      --container: 1200px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; color: var(--text); background: var(--bg); }
    .container { width: min(var(--container), calc(100% - 32px)); margin: 0 auto; }
    .site-header { position: sticky; top: 0; background: rgba(255,255,255,0.94); border-bottom: 1px solid var(--border); }
    .header-inner { min-height: 82px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-logo { width: 68px; height: 68px; border-radius: 50%; overflow: hidden; border: 3px solid #dceeff; background: #fff; box-shadow: var(--shadow-sm); }
    .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
    .brand-text h1 { margin: 0; font-size: 15px; line-height: 1.25; font-weight: 700; text-transform: uppercase; color: #1f4d7f; }
    .brand-text p { margin: 4px 0 0; color: var(--muted); font-size: 13px; font-weight: 600; }
    .nav a { padding: 10px 14px; border-radius: 12px; font-size: 14px; font-weight: 700; color: #2b4664; text-decoration: none; }
    .nav a.active { background: var(--primary); color: var(--white); }
    .hero { background: linear-gradient(135deg,#edf7ff,#dff1ff); }
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; padding: 40px 0; }
    .hero-title { font-size: 48px; margin: 0; }
    .red { color: var(--accent); }
    .blue { color: var(--primary); }
    .search-box { margin-top: 20px; }
    .search-row { display: flex; background: #fff; border-radius: 999px; border: 2px solid #87d0ff; overflow: hidden; }
    .search-input { flex: 1; padding: 14px; border: none; outline: none; }
    .search-button { background: var(--primary); color: #fff; border: none; padding: 14px 20px; }
    .visual-panel { background: linear-gradient(135deg,#0b66d0,#2aa4ff); border-radius: 24px; padding: 30px; text-align: center; color: #fff; }
    .logo-orb { width: 200px; height: 200px; border-radius: 50%; margin: 0 auto; background: #fff; padding: 10px; }
    .logo-orb img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .footer { text-align: center; padding: 20px; background: #0a1b32; color: #fff; }
  </style>
</head>
